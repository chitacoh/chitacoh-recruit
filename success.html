<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>応募完了｜イシンホーム半田店</title>
  <style>
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #F5F7FA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,109,173,0.10);
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; color: #006DAD; margin-bottom: 12px; }
    p { font-size: 0.95rem; color: #555; line-height: 1.8; margin-bottom: 28px; }
    a {
      display: inline-block;
      background: #006DAD;
      color: #fff;
      padding: 12px 32px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✅</div>
    <h1>応募を受け付けました！</h1>
    <p>
      ご応募いただきありがとうございます。<br>
      担当者より通常2〜3営業日以内にご連絡いたします。<br>
      しばらくお待ちください。
    </p>
    <a href="/">採用情報トップに戻る</a>
  </div>
</body>
</html>
